name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Both macOS-arm64 and ubuntu-latest (x86_64) run the full suite.
  # libghostty-vt prebuilts for both platforms live under
  # vendor/libghostty-vt/lib-{aarch64-darwin,x86_64-linux}/; .cargo/
  # config.toml picks the right pkgconfig dir per target.
  check:
    name: fmt · clippy · test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      # mnml depends on the fim-engine sibling crate by path (../fim-engine),
      # so check it out alongside this repo for the path dep to resolve.
      - name: Checkout mnml
        uses: actions/checkout@v4
        with:
          path: mnml
      - name: Checkout fim-engine
        uses: actions/checkout@v4
        with:
          repository: chris-mclennan/fim-engine
          path: fim-engine

      # libghostty-vt-sys consumes the pkg-config feature via the
      # `pkg-config` Rust crate, which shells out to the
      # `pkg-config` binary. Ubuntu runners need it installed.
      - name: Install pkg-config (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y pkg-config

      # libghostty-vt prebuilts live on a GitHub release (~25MB
      # total across 3 targets: aarch64-darwin, x86_64-linux,
      # aarch64-linux) rather than in git. Fetch them before any
      # cargo command — the script is idempotent so a warm cargo
      # cache hit doesn't re-download. Skipped on Windows: no
      # prebuilt exists for that target yet, so libghostty-vt-sys
      # falls back to its vendored zig-build path (see next step).
      - name: Fetch libghostty-vt prebuilts
        if: matrix.os != 'windows-latest'
        working-directory: mnml
        run: bash vendor/libghostty-vt/fetch-prebuilts.sh

      # `[target.<triple>.env]` in .cargo/config.toml doesn't reach
      # build scripts the way top-level `[env]` does, so set
      # PKG_CONFIG_PATH explicitly here per-runner via $GITHUB_ENV.
      # Path is relative to the workspace root (where cargo runs
      # via `working-directory: mnml`).
      - name: Set PKG_CONFIG_PATH for libghostty-vt
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            echo "PKG_CONFIG_PATH=${{ github.workspace }}/mnml/vendor/libghostty-vt/pkgconfig-darwin" >> "$GITHUB_ENV"
          else
            echo "PKG_CONFIG_PATH=${{ github.workspace }}/mnml/vendor/libghostty-vt/pkgconfig-linux" >> "$GITHUB_ENV"
          fi

      # Windows has no prebuilt libghostty-vt.a yet, so
      # libghostty-vt-sys' build.rs will vendored-build from source
      # — that needs zig 0.15.2 on PATH. Same story as the release
      # workflow's zig install.
      - name: Install zig 0.15.2 (Windows)
        if: matrix.os == 'windows-latest'
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: mnml
          key: ${{ matrix.os }}

      - name: rustfmt
        working-directory: mnml
        run: cargo fmt --all --check

      - name: clippy
        working-directory: mnml
        run: cargo clippy --all-targets -- -D warnings

      - name: test
        working-directory: mnml
        run: cargo test
