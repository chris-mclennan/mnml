name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Both macOS-arm64 and ubuntu-latest (x86_64) run the full suite.
  # libghostty-vt prebuilts for both platforms live under
  # vendor/libghostty-vt/lib-{aarch64-darwin,x86_64-linux}/; .cargo/
  # config.toml picks the right pkgconfig dir per target.
  check:
    name: fmt · clippy · test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      # mnml depends on the fim-engine sibling crate by path (../fim-engine),
      # so check it out alongside this repo for the path dep to resolve.
      - name: Checkout mnml
        uses: actions/checkout@v4
        with:
          path: mnml
      - name: Checkout fim-engine
        uses: actions/checkout@v4
        with:
          repository: chris-mclennan/fim-engine
          path: fim-engine

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: mnml
          key: ${{ matrix.os }}

      - name: rustfmt
        working-directory: mnml
        run: cargo fmt --all --check

      - name: clippy
        working-directory: mnml
        run: cargo clippy --all-targets -- -D warnings

      - name: test
        working-directory: mnml
        run: cargo test
