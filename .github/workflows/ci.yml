name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # macOS-only for now — the embedded terminal core (libghostty-vt)
  # ships as a darwin-arm64 prebuilt; the Linux build of that static
  # lib hasn't been cross-built yet. Linux CI can return once we
  # either cross-build libghostty-vt for x86_64 or feature-gate it
  # off on non-Apple targets. macOS gates the merge.
  check:
    name: fmt · clippy · test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest]
    steps:
      # mnml depends on the fim-engine sibling crate by path (../fim-engine),
      # so check it out alongside this repo for the path dep to resolve.
      - name: Checkout mnml
        uses: actions/checkout@v4
        with:
          path: mnml
      - name: Checkout fim-engine
        uses: actions/checkout@v4
        with:
          repository: chris-mclennan/fim-engine
          path: fim-engine

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: mnml
          key: ${{ matrix.os }}

      - name: rustfmt
        working-directory: mnml
        run: cargo fmt --all --check

      - name: clippy
        working-directory: mnml
        run: cargo clippy --all-targets -- -D warnings

      - name: test
        working-directory: mnml
        run: cargo test
