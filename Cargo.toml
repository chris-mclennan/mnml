[package]
name = "mnml"
version = "0.1.0"
edition = "2024"
description = "NvChad-style TUI IDE: pluggable vim/standard editing, splits, LSP, git, fuzzy finder, command palette, embedded terminal + Claude Code/Codex, baked-in HTTP request client, CDP capture, file-IPC + headless E2E harness."
license = "MIT"

[lib]
name = "mnml"
path = "src/lib.rs"

[[bin]]
name = "mnml"
path = "src/main.rs"

[dependencies]
# TUI — use ratatui's re-exported crossterm to avoid version skew.
ratatui = { version = "0.29", features = ["crossterm"] }
# File enumeration honoring .gitignore.
ignore = "0.4"
# Config (later, but cheap) + IPC status.json.
toml = "0.8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Added per-track later (kept out of P0 to keep build fast / resolution simple):
#   nucleo            — fuzzy matcher (picker/palette)            [P2]
#   portable-pty vt100 — embedded terminal / Claude Code / Codex  [Pty track]
#   reqwest           — HTTP request client (baked in)           [HTTP track]
#   tungstenite       — Chrome DevTools Protocol                 [CDP track]
#   lsp-types         — LSP client types                        [LSP track]
#   tree-sitter*      — syntax highlighting                      [P2]
#   arboard           — system clipboard                         [P1]

[dev-dependencies]
tempfile = "3"

[profile.release]
lto = true
codegen-units = 1
strip = true
