[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell", "powershell", "msi"]
# Target platforms to build apps for (Rust target-triple syntax).
# `aarch64-pc-windows-msvc` is OUT again. Two attempts so far:
#   v0.1.3 — Linux container + cargo-xwin: ring's clang `/imsvc`
#            invocation fails. Dropped.
#   v0.1.4 — re-added on native `windows-11-arm` runner (GA 2026-01-29).
#            Rust compile succeeds, but the MSI step fails: WiX
#            (`candle`) is NOT pre-installed on windows-11-arm runners
#            (whereas `windows-2022` has it). Dropped again.
# ARM Windows users have two paths today: install the x86_64 MSI (runs
# on ARM Windows under Microsoft's emulation), or grab the raw
# x86_64-pc-windows-msvc.zip. Native arm64 returns whenever either
# (a) cargo-dist exposes a per-target installer override (no MSI on
# arm64-windows, keep .zip) or (b) windows-11-arm runners get WiX
# bundled, whichever happens first.
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu", "x86_64-pc-windows-msvc"]
# Which actions to run on pull requests
pr-run-mode = "upload"
# YAML snippet injected into every build job's `steps:` array,
# *before* the build runs. We use it to check out the sibling repos
# that mnml's Cargo.toml references by path (`../fim-engine`).
# Lives at `.github/build-setup.yml` (one dir
# above `.github/workflows/`) so GitHub doesn't try to interpret
# it as a standalone workflow. dist resolves the path relative to
# `.github/workflows/`.
github-build-setup = "../build-setup.yml"
# Permit manual edits to the generated CI file — `dist plan` would
# otherwise refuse to run when release.yml drifts. We hand-add the
# sibling-clone step to the plan / build-global-artifacts / host
# jobs (cargo-dist only auto-injects `github-build-setup` into
# build-local-artifacts), so the file is intentionally out of sync.
allow-dirty = ["ci"]
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Whether to install an updater program
install-updater = false

# macOS .pkg bundle identifier (reverse-DNS, your control). Kept at
# the end of the file so it doesn't accidentally swallow the other
# top-level [dist.*] keys.
[dist.mac-pkg-config]
identifier = "sh.mnml.app"
